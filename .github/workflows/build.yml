name: Build & Package Desktop Application

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Tauri App
    strategy:
      fail-fast: false
      matrix:
        platform: [windows-latest, macos-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri Desktop Application
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          includeRelease: false
          includeDebug: false

      - name: Upload Windows MSI Artifact
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: numerix-calculator-windows-msi
          path: src-tauri/target/release/bundle/wix/*.msi
          if-no-files-found: ignore

      - name: Upload Windows EXE Artifact
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: numerix-calculator-windows-exe
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: ignore

      - name: Upload macOS DMG Artifact
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: numerix-calculator-macos-dmg
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: ignore

      - name: Upload macOS APP Artifact
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: numerix-calculator-macos-app
          path: src-tauri/target/release/bundle/macos/Numerix Calculator.app
          if-no-files-found: ignore
